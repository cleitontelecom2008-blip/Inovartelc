<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carimbo TEC MDU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #f1f5f9; }
        input, textarea, select {
            border: 1px solid #e2e8f0;
            border-radius: 0.375rem;
            padding: 0.45rem 0.6rem;
            width: 100%;
            background-color: #fff;
            font-size: 0.92rem;
        }
        input:focus, textarea:focus { outline: 2px solid #3b82f6; border-color: transparent; }
        .card {
            background: white;
            padding: 1.25rem 1.5rem;
            border-radius: 0.6rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            margin-bottom: 0.9rem;
        }
        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.4rem;
            margin-bottom: 0.9rem;
        }
        .field-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.2rem;
            display: block;
        }
        .obrig { color: #ef4444; }
        #toast {
            visibility: hidden;
            min-width: 200px;
            background: #1e293b;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 14px 20px;
            position: fixed;
            z-index: 100;
            left: 50%;
            transform: translateX(-50%);
            bottom: 30px;
            font-size: 0.9rem;
        }
        #toast.show {
            visibility: visible;
            animation: fadein 0.4s, fadeout 0.4s 2.6s;
        }
        @keyframes fadein  { from {bottom: 10px; opacity: 0} to {bottom: 30px; opacity: 1} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1} to {bottom: 10px; opacity: 0} }

        .item-row { position: relative; }
        .delete-btn { opacity: 0; transition: opacity 0.2s; }
        .item-row:hover .delete-btn { opacity: 1; }
        @media (max-width: 768px) { .delete-btn { opacity: 1; } }

        .printing-mode input,
        .printing-mode textarea {
            border: none !important;
            padding-left: 0 !important;
            font-weight: 600;
            color: #1a202c;
        }

        /* Header gradient */
        .app-header {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            color: white;
            border-radius: 0.75rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body class="min-h-screen p-3 md:p-6">

<div id="toast">Operação realizada!</div>

<div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="app-header no-screenshot">
        <div>
            <div class="text-xs font-semibold opacity-80 tracking-widest uppercase">Claro / Inovar Telecom</div>
            <div class="text-xl font-bold">Carimbo TEC MDU</div>
        </div>
        <div class="flex gap-2 flex-wrap justify-end">
            <button onclick="copyWhatsApp()" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold px-3 py-2 rounded-lg transition flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3"/></svg>
                WhatsApp
            </button>
            <button onclick="tirarPrint()" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold px-3 py-2 rounded-lg transition flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><circle cx="12" cy="13" r="3"/></svg>
                Print
            </button>
            <button onclick="limparTudo()" class="bg-white/10 hover:bg-white/20 text-white text-xs font-bold px-3 py-2 rounded-lg transition">
                🗑 Limpar
            </button>
        </div>
    </div>

    <div id="capture-area" class="p-1">

        <!-- Cabeçalho do carimbo -->
        <div class="card">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="field-label">DATA</label>
                    <input type="date" id="f-data">
                </div>
                <div>
                    <label class="field-label">TÉCNICO RESPONSÁVEL</label>
                    <input type="text" id="f-tecnico" placeholder="Nome do técnico">
                </div>
            </div>
        </div>

        <!-- Informações do Projeto -->
        <div class="card">
            <div class="section-title text-red-700">📋 Informações do Projeto</div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
                <div>
                    <label class="field-label"><span class="obrig">*</span> TIPO DE PROJETO</label>
                    <select id="f-tipo-projeto">
                        <option value="">Selecione...</option>
                        <option>MDU Novo</option>
                        <option>MDU Retrofit</option>
                        <option>MDU Ampliação</option>
                        <option>MDU Correção</option>
                        <option>MDU Manutenção</option>
                    </select>
                </div>
                <div>
                    <label class="field-label"><span class="obrig">*</span> EMPRESA RESPONSÁVEL</label>
                    <input type="text" id="f-empresa" placeholder="Ex: Inovar Telecom">
                </div>
            </div>

            <div class="mb-3">
                <label class="field-label"><span class="obrig">*</span> ENDEREÇO</label>
                <div class="flex gap-2">
                    <input type="text" id="f-endereco" placeholder="Rua, Número, Bairro, Cidade - UF" class="flex-1">
                    <button onclick="obterGPS()" class="no-screenshot bg-red-600 text-white text-xs font-bold px-3 py-2 rounded-lg hover:bg-red-700 transition whitespace-nowrap">📍 GPS</button>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div>
                    <label class="field-label">NOME EDI / CONDOMÍNIO / BLOCO</label>
                    <input type="text" id="f-nome-edi" placeholder="Nome do empreendimento">
                </div>
                <div>
                    <label class="field-label">QUANTIDADE DE BLOCOS</label>
                    <input type="number" id="f-qtd-blocos" placeholder="0" min="0">
                </div>
            </div>
        </div>

        <!-- Dados Técnicos -->
        <div class="card">
            <div class="section-title text-gray-700">🔧 Dados Técnicos</div>

            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-3">
                <div>
                    <label class="field-label"><span class="obrig">*</span> QUANTIDADE DE HP</label>
                    <input type="number" id="f-qtd-hp" placeholder="0" min="0">
                </div>
                <div>
                    <label class="field-label"><span class="obrig">*</span> NODE</label>
                    <input type="text" id="f-node" placeholder="Ex: N001">
                </div>
                <div>
                    <label class="field-label"><span class="obrig">*</span> CAIXA M</label>
                    <input type="text" id="f-caixa-m" placeholder="Ex: CM-01">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div>
                    <label class="field-label"><span class="obrig">*</span> COD. IMÓVEL / ID DEMANDA</label>
                    <input type="text" id="f-cod-imovel" placeholder="Código ou ID">
                </div>
                <div>
                    <label class="field-label"><span class="obrig">*</span> ANDAR DAS NAPS</label>
                    <input type="text" id="f-andar-naps" placeholder="Ex: 1°, 3°, Térreo">
                </div>
            </div>
        </div>

        <!-- Serviços Realizados -->
        <div class="card">
            <div class="section-title text-blue-700">✅ Serviços Realizados</div>
            <div id="servicos-list" class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-3"></div>
            <div class="flex gap-2 no-screenshot mt-2">
                <input type="text" id="new-servico" placeholder="Adicionar serviço..." class="flex-1 text-sm">
                <button onclick="addServico()" class="bg-blue-50 text-blue-700 font-bold px-3 py-2 rounded border border-blue-200 hover:bg-blue-100 transition text-sm">+ Add</button>
            </div>
        </div>

        <!-- Material Utilizado -->
        <div class="card">
            <div class="section-title text-orange-700">📦 Material Utilizado</div>
            <div id="materiais-list" class="space-y-2 mb-3"></div>
            <div class="flex gap-2 no-screenshot mt-2">
                <input type="text" id="new-material" placeholder="Adicionar material..." class="flex-1 text-sm">
                <button onclick="addMaterial()" class="bg-orange-50 text-orange-700 font-bold px-3 py-2 rounded border border-orange-200 hover:bg-orange-100 transition text-sm">+ Add</button>
            </div>
        </div>

        <!-- Observações -->
        <div class="card">
            <div class="section-title text-gray-600">📝 Observações</div>
            <textarea id="f-obs" rows="3" placeholder="Pendências, ocorrências, observações gerais..."></textarea>
        </div>

    </div><!-- /capture-area -->

    <footer class="text-center text-gray-400 text-xs mt-4 pb-8">
        Inovar Telecom · Carimbo TEC MDU
    </footer>
</div>

<!-- Modal Print -->
<div id="print-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
    <div class="bg-white p-4 rounded-xl max-w-full max-h-[92vh] overflow-auto flex flex-col items-center relative w-full">
        <button onclick="document.getElementById('print-modal').classList.add('hidden')" class="absolute top-3 right-3 text-gray-500 hover:text-black p-1">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <h3 class="text-base font-bold mb-3 text-gray-800">Carimbo TEC MDU</h3>
        <p class="text-xs text-blue-600 mb-3">Pressione e segure a imagem para salvar/compartilhar.</p>
        <div id="print-container" class="shadow-lg border rounded mb-4 w-full"></div>
        <button onclick="document.getElementById('print-modal').classList.add('hidden')" class="bg-red-600 text-white px-8 py-2 rounded-lg font-bold text-sm">Fechar</button>
    </div>
</div>

<script>
// ── Persistência ──────────────────────────────────────────────
const STORE_KEY = 'carimbo_mdu_v1';

const defaultStore = {
    tecnico: '',
    empresa: 'Inovar Telecom',
    servicos: [
        'Passagem de cabo coaxial',
        'Instalação de splitter',
        'Certificação de sinal',
        'Instalação de NAP',
        'Identificação de portas',
        'Teste de continuidade',
        'Instalação de ONU/ONT',
        'Acerto de passagem vertical'
    ],
    materiais: [
        'Cabo coaxial (metros)',
        'Conector F',
        'Splitter',
        'NAP',
        'Abraçadeira',
        'Canaleta (metros)',
        'Fio óptico drop (metros)',
        'Rótulo/etiqueta'
    ]
};

let store = (() => {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || JSON.parse(JSON.stringify(defaultStore)); }
    catch { return JSON.parse(JSON.stringify(defaultStore)); }
})();

function saveStore() { localStorage.setItem(STORE_KEY, JSON.stringify(store)); }

// ── Init ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('f-data').value = new Date().toISOString().split('T')[0];

    const tec = document.getElementById('f-tecnico');
    tec.value = store.tecnico || '';
    tec.addEventListener('input', () => { store.tecnico = tec.value; saveStore(); });

    const emp = document.getElementById('f-empresa');
    emp.value = store.empresa || '';
    emp.addEventListener('input', () => { store.empresa = emp.value; saveStore(); });

    renderServicos();
    renderMateriais();
});

// ── Serviços ──────────────────────────────────────────────────
function renderServicos() {
    const c = document.getElementById('servicos-list');
    c.innerHTML = '';
    store.servicos.forEach((s, i) => {
        const d = document.createElement('div');
        d.className = 'item-row flex items-center gap-2 p-2 bg-gray-50 rounded border border-transparent hover:border-blue-100 group';
        d.innerHTML = `
            <input type="checkbox" id="sv-${i}" class="w-5 h-5 cursor-pointer no-screenshot-check" data-name="${s}">
            <label for="sv-${i}" class="text-sm text-gray-700 cursor-pointer flex-1 select-none">${s}</label>
            <button onclick="removeServico(${i})" class="delete-btn no-screenshot text-red-400 hover:text-red-600 p-1 rounded hover:bg-red-50 text-xs" title="Remover">✕</button>
        `;
        c.appendChild(d);
    });
}

function addServico() {
    const inp = document.getElementById('new-servico');
    const val = inp.value.trim();
    if (val && !store.servicos.includes(val)) {
        store.servicos.push(val);
        saveStore();
        inp.value = '';
        renderServicos();
        showToast('Serviço adicionado!');
    }
}

function removeServico(i) {
    store.servicos.splice(i, 1);
    saveStore();
    renderServicos();
}

// ── Materiais ─────────────────────────────────────────────────
function renderMateriais() {
    const c = document.getElementById('materiais-list');
    c.innerHTML = '';
    store.materiais.forEach((m, i) => {
        const d = document.createElement('div');
        d.className = 'item-row flex items-center gap-2 p-2 bg-gray-50 rounded border border-transparent hover:border-orange-100 group';
        d.innerHTML = `
            <input type="checkbox" id="mt-${i}" class="w-5 h-5 cursor-pointer no-screenshot-check" data-name="${m}">
            <label for="mt-${i}" class="text-sm text-gray-700 cursor-pointer flex-1 select-none">${m}</label>
            <input type="text" id="qty-mt-${i}" placeholder="Qtd" class="w-16 text-xs py-1 h-8 bg-white" onclick="document.getElementById('mt-${i}').checked=true">
            <button onclick="removeMaterial(${i})" class="delete-btn no-screenshot text-red-400 hover:text-red-600 p-1 rounded hover:bg-red-50 text-xs" title="Remover">✕</button>
        `;
        c.appendChild(d);
    });
}

function addMaterial() {
    const inp = document.getElementById('new-material');
    const val = inp.value.trim();
    if (val && !store.materiais.includes(val)) {
        store.materiais.push(val);
        saveStore();
        inp.value = '';
        renderMateriais();
        showToast('Material adicionado!');
    }
}

function removeMaterial(i) {
    store.materiais.splice(i, 1);
    saveStore();
    renderMateriais();
}

// ── GPS ───────────────────────────────────────────────────────
async function obterGPS() {
    if (!navigator.geolocation) { showToast('GPS não disponível.'); return; }
    showToast('Buscando localização...');
    navigator.geolocation.getCurrentPosition(async pos => {
        try {
            const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&addressdetails=1`);
            const d = await r.json();
            if (d.address) {
                const a = d.address;
                const rua  = a.road || a.pedestrian || '';
                const num  = a.house_number ? `, ${a.house_number}` : '';
                const bai  = a.suburb || a.neighbourhood || a.city_district || '';
                const cid  = a.city || a.town || a.village || '';
                const est  = a.state_code || a.state || '';
                document.getElementById('f-endereco').value = `${rua}${num}${bai ? ', ' + bai : ''} - ${cid}/${est}`;
                showToast('Endereço preenchido!');
            }
        } catch { showToast('Erro ao identificar endereço.'); }
    }, () => showToast('Permissão de GPS negada.'));
}

// ── Helpers ───────────────────────────────────────────────────
const g = id => (document.getElementById(id)?.value || '').trim() || '---';

// ── WhatsApp ──────────────────────────────────────────────────
function copyWhatsApp() {
    const svs  = [...document.querySelectorAll('[id^="sv-"]:checked')].map(c => '✅ ' + c.getAttribute('data-name'));
    const mats = [...document.querySelectorAll('[id^="mt-"]:checked')].map(c => {
        const idx = c.id.split('-')[1];
        const qty = document.getElementById(`qty-mt-${idx}`)?.value || '—';
        return `📦 ${qty}x ${c.getAttribute('data-name')}`;
    });

    let t = `🏢 *CARIMBO TEC MDU*\n`;
    t += `📅 *Data:* ${g('f-data')} | 👷 *Técnico:* ${g('f-tecnico')}\n\n`;
    t += `📋 *INFORMAÇÕES DO PROJETO*\n`;
    t += `▸ Tipo de Projeto: ${g('f-tipo-projeto')}\n`;
    t += `▸ Endereço: ${g('f-endereco')}\n`;
    t += `▸ Nome EDI/Condomínio/Bloco: ${g('f-nome-edi')}\n`;
    t += `▸ Qtd. Blocos: ${g('f-qtd-blocos')}\n\n`;
    t += `🔧 *DADOS TÉCNICOS*\n`;
    t += `▸ Qtd. HP: ${g('f-qtd-hp')}\n`;
    t += `▸ NODE: ${g('f-node')}\n`;
    t += `▸ Caixa M: ${g('f-caixa-m')}\n`;
    t += `▸ Cód. Imóvel / ID Demanda: ${g('f-cod-imovel')}\n`;
    t += `▸ Andar das NAPs: ${g('f-andar-naps')}\n`;
    t += `▸ Empresa: ${g('f-empresa')}\n`;
    if (svs.length)  t += `\n✅ *SERVIÇOS:*\n${svs.join('\n')}\n`;
    if (mats.length) t += `\n📦 *MATERIAIS:*\n${mats.join('\n')}\n`;
    const obs = g('f-obs');
    if (obs !== '---') t += `\n📝 *OBS:* ${obs}\n`;

    navigator.clipboard?.writeText(t).then(() => showToast('Copiado para o WhatsApp!'))
        .catch(() => {
            const el = document.createElement('textarea');
            el.value = t; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            showToast('Copiado!');
        });
}

// ── Print ─────────────────────────────────────────────────────
async function tirarPrint() {
    const area = document.getElementById('capture-area');
    const hide = document.querySelectorAll('.no-screenshot');
    hide.forEach(el => el.style.display = 'none');
    document.querySelectorAll('.item-row').forEach(row => {
        const cb = row.querySelector('input[type="checkbox"]');
        if (cb && !cb.checked) row.style.display = 'none';
        else if (cb) cb.style.display = 'none';
    });
    area.classList.add('printing-mode');
    try {
        const canvas = await html2canvas(area, { backgroundColor: '#f1f5f9', scale: 2.5, useCORS: true });
        const img = document.createElement('img');
        img.src = canvas.toDataURL('image/png');
        img.className = 'max-w-full h-auto rounded';
        document.getElementById('print-container').innerHTML = '';
        document.getElementById('print-container').appendChild(img);
        document.getElementById('print-modal').classList.remove('hidden');
    } catch { showToast('Erro ao gerar imagem.'); }
    finally {
        hide.forEach(el => el.style.display = '');
        document.querySelectorAll('.item-row').forEach(r => r.style.display = '');
        document.querySelectorAll('[id^="sv-"], [id^="mt-"]').forEach(cb => cb.style.display = '');
        area.classList.remove('printing-mode');
    }
}

// ── Limpar ────────────────────────────────────────────────────
function limparTudo() {
    if (!confirm('Limpar todos os campos? Os serviços/materiais cadastrados serão mantidos.')) return;
    ['f-tipo-projeto','f-endereco','f-nome-edi','f-qtd-blocos',
     'f-qtd-hp','f-node','f-caixa-m','f-cod-imovel','f-andar-naps','f-obs']
        .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    document.getElementById('f-data').value = new Date().toISOString().split('T')[0];
    document.querySelectorAll('[id^="sv-"], [id^="mt-"]').forEach(cb => cb.checked = false);
    document.querySelectorAll('[id^="qty-mt-"]').forEach(el => el.value = '');
    showToast('Campos limpos!');
}

// ── Toast ─────────────────────────────────────────────────────
function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.className = 'show';
    setTimeout(() => t.className = '', 3000);
}

// Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
